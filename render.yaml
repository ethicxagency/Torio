# Render Blueprint — Torio (unified web + API on one domain)
# Docs: docs/UNIFIED_RENDER_DEPLOYMENT.md
#
# Browser: https://<your-service>.onrender.com/
# API:      https://<your-service>.onrender.com/api/v1/*

databases:
  - name: torio-postgres
    plan: basic-256mb
    region: singapore
    databaseName: torio_messaging
    user: torio

services:
  - type: web
    name: torio
    runtime: node
    plan: starter
    region: singapore
    buildCommand: npm ci --include=dev && npm run build:render:unified
    startCommand: node scripts/render-start-unified.mjs
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: torio-postgres
          property: connectionString
      - key: INTERNAL_API_PORT
        value: "4001"
      - key: INTERNAL_WEB_PORT
        value: "3001"
      - key: API_URL
        sync: false
      - key: WEB_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: META_WEBHOOK_VERIFY_TOKEN
        generateValue: true
      - key: META_OAUTH_REDIRECT_URL
        sync: false
      - key: META_WEBHOOK_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LOG_LEVEL
        value: log

  - type: redis
    name: torio-redis
    plan: free
    region: singapore
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
